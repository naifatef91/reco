name: support_call_recorder
description: Flutter Android call recorder for support teams.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  phone_state: ^1.0.4
  record: ^6.1.2
  just_audio: ^0.9.46
  encrypt: ^5.0.3
  crypto: ^3.0.6
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  local_auth: ^2.3.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/icon.png
